# ========================================
# A. 品牌与产品基础信息
# ========================================
brand_name: "[Brand Name]"
product_niche: "[Niche Name]"
product_niche_cn: "[中文品类名]"
domain: "example.com"
contact_email: "info@example.com"
wholesale_email: "wholesale@example.com"

# ========================================
# B. 产品分类（来自 site_tone.md categories）
# ========================================
categories:
  - name: "Category A"
    slug: "category-a"
  - name: "Category B"
    slug: "category-b"
  - name: "Category C"
    slug: "category-c"

# ========================================
# C. 商业参数
# ========================================
price_band: "$X-Y"
free_shipping_threshold: "$50.00"
return_policy_days: "30"

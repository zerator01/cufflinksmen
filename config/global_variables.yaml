material_summary: "[Material List — varies by product tier]"

# ========================================
# E. 站点定位（来自 site_tone.md positioning）
# ========================================
positioning: "[Core Positioning / Vibe]"
brand_usp: "[Unique Selling Proposition]"

# B2C 定位：精选站（curator）
target_b2c: "[B2C Audience Description]"

# B2B 定位：中国专业买手
target_b2b: "[B2B Audience Description]"

# ========================================
# F. 资产配置
# ========================================
assets_domain: "assets.example.com"
r2_bucket: "example-assets"

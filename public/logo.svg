<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 64" width="340" height="64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600&amp;family=Outfit:wght@300;400&amp;display=swap');
      .text-mark { 
        font-family: 'Cormorant', 'Didot', 'Playfair Display', Georgia, serif; 
        font-size: 28px; 
        font-weight: 500; 
        fill: #111111; 
      }
      .text-sub {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-size: 8.5px;
        font-weight: 300;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        fill: #888888;
      }
      .mark-line {
        fill: none;
        stroke: #111111;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  
  <!-- Architectural Jewel Mark (Museum Quality) -->
  <g transform="translate(4, 14)">
    <!-- Outer sharp diamond bounding -->
    <path class="mark-line" stroke-width="1.2" d="M16 0 L32 16 L16 36 L0 16 Z" />
    <!-- Inner facet geometric refraction -->
    <path class="mark-line" stroke-width="0.6" opacity="0.6" d="M16 0 L24 16 L16 36 L8 16 Z" />
    <!-- Horizontal tension line -->
    <line x1="0" y1="16" x2="32" y2="16" class="mark-line" stroke-width="0.6" opacity="0.4" />
  </g>
  
  <!-- Wordmark -->
  <text x="48" y="34" class="text-mark">Bridal Jewellery Set</text>
  <text x="49" y="48" class="text-sub">Curated Collections</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 64" width="340" height="64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .text-mark { 
        font-family: 'Outfit', -apple-system, sans-serif; 
        font-size: 26px; 
        font-weight: 600; 
        letter-spacing: -0.01em;
        text-transform: uppercase;
        fill: #111111; 
      }
      .text-sub {
        font-family: 'Inter', -apple-system, sans-serif;
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        fill: #888888;
      }
      .face-top { fill: #111111; }
      .face-left { fill: none; stroke: #111111; stroke-width: 1.5; stroke-linejoin: round; }
      .face-right { fill: none; stroke: #111111; stroke-width: 1.5; stroke-linejoin: round; opacity: 0.4; }
    </style>
  </defs>
  
  <!-- Isometric Milled Cube / Hexagon Mark -->
  <g transform="translate(4, 14)">
    <!-- Top Face (Solid) -->
    <polygon class="face-top" points="16,0 32,9 16,18 0,9" />
    <!-- Left Face (Hollow/Outlined) -->
    <polygon class="face-left" points="0,9 16,18 16,36 0,27" />
    <!-- Right Face (Hollow/Faded) -->
    <polygon class="face-right" points="16,18 32,9 32,27 16,36" />
    <!-- Accent Line (Precision Cut) -->
    <line x1="8" y1="22.5" x2="8" y2="31.5" stroke="#111111" stroke-width="1.5" />
    <line x1="24" y1="22.5" x2="24" y2="31.5" stroke="#111111" stroke-width="1.5" opacity="0.4" />
  </g>
  
  <!-- Wordmark -->
  <text x="48" y="34" class="text-mark">CUFFLINKS MEN</text>
  <text x="50" y="48" class="text-sub">FACTORY DIRECT</text>
</svg>

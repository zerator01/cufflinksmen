# F. About Us
about:
  story_title: "Our Story"
  story: "We started with a question most men ask once and never again: where do you actually buy decent cufflinks without getting ripped off? We're a small sourcing team based in China's accessories manufacturing hub. We spend our days visiting factories, inspecting samples, and rejecting anything with a weak clasp, a cheap plating, or a price that doesn't make sense. We don't design. We don't manufacture. We select — carefully."
  difference_title: "Why Choose Us"
  difference_points:
    - "Curated, not mass-listed: We reject most samples we receive. Only pairs with solid mechanisms and honest finishes make the cut."
    - "Materials stated plainly: Every product page tells you exactly what the cufflink is made of — alloy, stainless steel, plated, or sterling. No mystery metals."
    - "Mechanisms that hold: We test every clasp type — bullet-back, whale-back, and fixed — before listing. A cufflink that pops open is a cufflink we won't sell."
    - "Free shipping over $35: We ship worldwide. Most orders arrive within 7-15 business days."

